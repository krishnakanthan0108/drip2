<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — DRIP.</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .auth-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      background: radial-gradient(ellipse at 60% 20%, rgba(201,169,110,0.06) 0%, transparent 60%);
    }
    .auth-card {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 48px 40px;
    }
    .auth-logo { font-family: var(--ff-serif); font-size: 2rem; color: var(--gold); text-align: center; margin-bottom: 8px; }
    .auth-tagline { text-align: center; font-size: 13px; color: var(--text-soft); margin-bottom: 36px; }
    .tab-bar { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
    .tab-btn { flex: 1; padding: 12px; font-size: 13px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-soft); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all var(--transition); }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    .auth-error { background: rgba(192,57,43,0.15); border: 1px solid rgba(192,57,43,0.4); color: #e74c3c; border-radius: var(--radius); padding: 12px 16px; font-size: 13px; margin-bottom: 20px; display: none; }
    .auth-success { background: rgba(46,204,113,0.15); border: 1px solid rgba(46,204,113,0.4); color: var(--success); border-radius: var(--radius); padding: 12px 16px; font-size: 13px; margin-bottom: 20px; display: none; }
    .submit-btn { width: 100%; padding: 15px; font-size: 14px; justify-content: center; margin-top: 8px; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; color: var(--muted); font-size: 12px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .oauth-btn { width: 100%; padding: 13px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; color: var(--text); display: flex; align-items: center; justify-content: center; gap: 10px; transition: all var(--transition); }
    .oauth-btn:hover { border-color: var(--gold); background: rgba(201,169,110,0.05); }
    .forgot-link { display: block; text-align: right; font-size: 12px; color: var(--text-soft); margin-top: -12px; margin-bottom: 20px; transition: color var(--transition); }
    .forgot-link:hover { color: var(--gold); }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="container nav-inner">
    <a href="../index.html" class="nav-logo">DRIP<span>.</span></a>
    <div style="flex:1"></div>
    <a href="../index.html" style="font-size:13px;color:var(--text-soft)">← Back to Shop</a>
  </div>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">DRIP.</div>
    <div class="auth-tagline">Your style, your account</div>

    <div class="tab-bar">
      <button class="tab-btn active" id="tab-login">Sign In</button>
      <button class="tab-btn" id="tab-signup">Create Account</button>
    </div>

    <div id="error-msg" class="auth-error"></div>
    <div id="success-msg" class="auth-success"></div>

    <!-- LOGIN FORM -->
    <div id="login-form">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <a href="#" class="forgot-link">Forgot password?</a>
      <button class="btn-primary submit-btn" id="login-btn">
        Sign In
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signup-form" style="display:none">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" id="signup-name" placeholder="Your full name" autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="signup-password" placeholder="Min. 8 characters" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" id="signup-confirm" placeholder="Repeat password" autocomplete="new-password">
        </div>
      </div>
      <button class="btn-primary submit-btn" id="signup-btn">Create Account</button>
    </div>

    <div class="divider">or continue with</div>
    <button class="oauth-btn" id="google-btn">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
  import { signIn, signUp, getCurrentUser } from '../js/auth.js';
  import { supabase } from '../js/config.js';

  const redirect = new URLSearchParams(window.location.search).get('redirect') || '../index.html';

  // If already logged in, redirect
  getCurrentUser().then(user => {
    if (user) window.location.href = redirect;
  });

  // Tabs
  const tabs = { login: document.getElementById('tab-login'), signup: document.getElementById('tab-signup') };
  const forms = { login: document.getElementById('login-form'), signup: document.getElementById('signup-form') };
  tabs.login.addEventListener('click', () => switchTab('login'));
  tabs.signup.addEventListener('click', () => switchTab('signup'));
  function switchTab(tab) {
    Object.keys(tabs).forEach(k => {
      tabs[k].classList.toggle('active', k === tab);
      forms[k].style.display = k === tab ? 'block' : 'none';
    });
    clearMessages();
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('success-msg').style.display = 'none';
  }
  function showSuccess(msg) {
    const el = document.getElementById('success-msg');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('error-msg').style.display = 'none';
  }
  function clearMessages() {
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('success-msg').style.display = 'none';
  }
  function setLoading(btn, loading) {
    btn.disabled = loading;
    btn.textContent = loading ? 'Please wait…' : btn.dataset.label;
  }

  // Login
  const loginBtn = document.getElementById('login-btn');
  loginBtn.dataset.label = 'Sign In';
  loginBtn.addEventListener('click', async () => {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) { showError('Please fill in all fields.'); return; }
    setLoading(loginBtn, true);
    try {
      await signIn(email, password);
      window.location.href = redirect;
    } catch (err) {
      showError(err.message || 'Sign in failed. Please check your credentials.');
      setLoading(loginBtn, false);
    }
  });

  // Signup
  const signupBtn = document.getElementById('signup-btn');
  signupBtn.dataset.label = 'Create Account';
  signupBtn.addEventListener('click', async () => {
    const name = document.getElementById('signup-name').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const confirm = document.getElementById('signup-confirm').value;
    if (!name || !email || !password) { showError('Please fill in all fields.'); return; }
    if (password !== confirm) { showError('Passwords do not match.'); return; }
    if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
    setLoading(signupBtn, true);
    try {
      await signUp(email, password, name);
      showSuccess('Account created! Check your email to confirm your address.');
      setLoading(signupBtn, false);
    } catch (err) {
      showError(err.message || 'Sign up failed. Please try again.');
      setLoading(signupBtn, false);
    }
  });

  // Google OAuth
  document.getElementById('google-btn').addEventListener('click', async () => {
    await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + redirect }
    });
  });

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (forms.login.style.display !== 'none') loginBtn.click();
      else signupBtn.click();
    }
  });
</script>
</body>
</html>
