<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — DRIP.</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .product-detail { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; padding: 60px 0; align-items: start; }
    .product-images { position: sticky; top: 88px; }
    .main-image { aspect-ratio: 3/4; border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 12px; }
    .main-image img { width: 100%; height: 100%; object-fit: cover; }
    .thumb-row { display: flex; gap: 10px; }
    .thumb { width: 80px; height: 100px; border-radius: var(--radius); overflow: hidden; border: 2px solid transparent; cursor: pointer; transition: border-color var(--transition); }
    .thumb.active, .thumb:hover { border-color: var(--gold); }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .product-title { font-family: var(--ff-serif); font-size: clamp(1.8rem, 3vw, 2.8rem); color: var(--white); margin-bottom: 16px; }
    .product-price { font-size: 1.6rem; color: var(--gold); font-weight: 700; margin-bottom: 8px; }
    .product-desc { color: var(--text-soft); line-height: 1.9; margin-bottom: 32px; }
    .size-selector { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 28px; }
    .size-opt { padding: 10px 18px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; cursor: pointer; color: var(--text-soft); transition: all var(--transition); }
    .size-opt.selected, .size-opt:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,169,110,0.08); }
    .size-opt.out-of-stock { opacity: 0.4; cursor: not-allowed; text-decoration: line-through; }
    .add-to-bag { width: 100%; padding: 16px; font-size: 14px; letter-spacing: 0.08em; justify-content: center; margin-bottom: 12px; }
    .wishlist-btn { width: 100%; padding: 14px; font-size: 13px; letter-spacing: 0.06em; justify-content: center; }
    .product-meta { margin-top: 32px; padding-top: 32px; border-top: 1px solid var(--border); }
    .meta-item { display: flex; gap: 12px; margin-bottom: 16px; align-items: flex-start; }
    .meta-icon { color: var(--gold); font-size: 18px; flex-shrink: 0; }
    .meta-text { font-size: 13px; color: var(--text-soft); }
    .meta-text strong { color: var(--text); display: block; margin-bottom: 2px; }
    @media (max-width: 768px) { .product-detail { grid-template-columns: 1fr; gap: 32px; } .product-images { position: static; } }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="container nav-inner">
    <a href="../index.html" class="nav-logo">DRIP<span>.</span></a>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
    </ul>
    <div class="nav-actions">
      <a href="auth.html" class="nav-icon-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </a>
      <button class="nav-icon-btn" id="cart-toggle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span class="cart-badge" style="display:none">0</span>
      </button>
    </div>
  </div>
</nav>

<div class="container">
  <!-- Breadcrumb -->
  <nav style="padding-top:24px;font-size:12px;color:var(--text-soft)">
    <a href="../index.html" style="color:var(--text-soft)">Home</a>
    <span style="margin:0 8px">→</span>
    <a href="shop.html" style="color:var(--text-soft)">Shop</a>
    <span style="margin:0 8px">→</span>
    <span id="breadcrumb-name" style="color:var(--text)">Product</span>
  </nav>

  <div class="product-detail">
    <!-- Images -->
    <div class="product-images">
      <div class="main-image"><img id="main-img" src="" alt="Product"></div>
      <div class="thumb-row" id="thumbs"></div>
    </div>

    <!-- Info -->
    <div class="product-info">
      <p class="section-subtitle" id="product-category"></p>
      <h1 class="product-title" id="product-name">Loading…</h1>
      <div style="display:flex;gap:16px;align-items:center;margin-bottom:16px">
        <div class="product-price" id="product-price"></div>
        <div id="product-original-price" style="font-size:1.1rem;color:var(--muted);text-decoration:line-through;display:none"></div>
        <span id="product-badge" style="display:none"></span>
      </div>
      <p class="product-desc" id="product-desc"></p>

      <div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <span style="font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-soft)">Select Size</span>
          <a href="#" style="font-size:12px;color:var(--gold)">Size Guide</a>
        </div>
        <div class="size-selector" id="size-selector"></div>
      </div>

      <div style="display:flex;gap:12px;margin-bottom:16px">
        <div style="display:flex;align-items:center;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
          <button id="qty-minus" style="padding:14px 16px;color:var(--text);font-size:18px;transition:background var(--transition)" onmouseover="this.style.background='var(--surface)'" onmouseout="this.style.background='transparent'">−</button>
          <span id="qty-display" style="padding:0 20px;min-width:50px;text-align:center;font-weight:500">1</span>
          <button id="qty-plus" style="padding:14px 16px;color:var(--text);font-size:18px;transition:background var(--transition)" onmouseover="this.style.background='var(--surface)'" onmouseout="this.style.background='transparent'">+</button>
        </div>
      </div>

      <button class="btn-primary add-to-bag" id="add-to-cart-btn">Add to Cart</button>
      <button class="btn-outline wishlist-btn">♡ &nbsp;Add to Wishlist</button>

      <div class="product-meta">
        <div class="meta-item">
          <span class="meta-icon">🚚</span>
          <div class="meta-text"><strong>Free Delivery</strong>On orders above ₹999 across India</div>
        </div>
        <div class="meta-item">
          <span class="meta-icon">↩️</span>
          <div class="meta-text"><strong>Easy 30-Day Returns</strong>No questions asked return policy</div>
        </div>
        <div class="meta-item">
          <span class="meta-icon">🔒</span>
          <div class="meta-text"><strong>Secure Payment</strong>Powered by Razorpay — UPI, Cards, NetBanking</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- CART SIDEBAR -->
<div class="cart-overlay" id="cart-overlay"></div>
<aside class="cart-sidebar" id="cart-sidebar">
  <div class="cart-header"><h2>Your Cart</h2><button class="cart-close" id="cart-close">✕</button></div>
  <div class="cart-items" id="cart-items-container"></div>
  <div class="cart-footer" id="cart-footer"></div>
</aside>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
  import { getProduct, formatPrice } from '../js/products.js';
  import { addToCart, getCart, removeFromCart, updateQuantity, getCartTotal } from '../js/cart.js';

  const id = new URLSearchParams(window.location.search).get('id');
  let selectedSize = null;
  let qty = 1;

  // Demo data fallback
  const demoProducts = {
    1: { id: 1, name: 'Obsidian Oversized Tee', category: 'Streetwear', price: 1299, sale_price: null, image_url: 'https://images.unsplash.com/photo-1618354691373-d851c5c3a990?w=900&q=80', description: 'A premium heavyweight tee with a relaxed oversized silhouette. Made from 280GSM combed cotton with a subtle enzyme wash for that lived-in feel. Ribbed collar, dropped shoulders, and an extended length for streetwear layering.', sizes: ['XS','S','M','L','XL','XXL'] },
    2: { id: 2, name: 'Linen Relaxed Blazer', category: 'Men', price: 4999, sale_price: 3499, image_url: 'https://images.unsplash.com/photo-1507679799987-c73779587ccf?w=900&q=80', description: 'A structured yet breathable linen blazer perfect for warm-weather occasions. Features a single-button fastening, notch lapels, and two patch pockets. Fully lined for comfort and drape.', sizes: ['S','M','L','XL'] },
    3: { id: 3, name: 'Minimal Wrap Dress', category: 'Women', price: 2799, sale_price: null, image_url: 'https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=900&q=80', description: 'A timeless wrap dress in soft crepe fabric with a surplice neckline and adjustable tie waist. The fluid silhouette flatters every body type. Wear it day or night with ease.', sizes: ['XS','S','M','L','XL'] },
    4: { id: 4, name: 'Cargo Utility Pants', category: 'Streetwear', price: 2299, sale_price: null, image_url: 'https://images.unsplash.com/photo-1594938298603-c8148c4dae35?w=900&q=80', description: 'Relaxed-fit cargo pants in durable ripstop fabric. Multiple utility pockets, adjustable drawstring hem, and a straight leg cut make these the ultimate streetwear staple.', sizes: ['S','M','L','XL','XXL'] },
  };

  async function loadProduct() {
    let product;
    try { product = await getProduct(id); } catch { product = demoProducts[id] || demoProducts[1]; }

    document.title = `${product.name} — DRIP.`;
    document.getElementById('breadcrumb-name').textContent = product.name;
    document.getElementById('product-name').textContent = product.name;
    document.getElementById('product-category').textContent = product.category;
    document.getElementById('product-desc').textContent = product.description || 'Premium quality clothing crafted for comfort and style.';
    document.getElementById('main-img').src = product.image_url;
    document.getElementById('main-img').alt = product.name;

    const effPrice = product.sale_price || product.price;
    document.getElementById('product-price').textContent = formatPrice(effPrice);
    if (product.sale_price) {
      const op = document.getElementById('product-original-price');
      op.textContent = formatPrice(product.price);
      op.style.display = 'block';
      const badge = document.getElementById('product-badge');
      const pct = Math.round((1 - product.sale_price / product.price) * 100);
      badge.textContent = `${pct}% OFF`;
      badge.style.cssText = 'display:inline-block;background:var(--red);color:#fff;padding:4px 10px;border-radius:100px;font-size:11px;font-weight:700;letter-spacing:0.06em';
    }

    const sizes = product.sizes || ['XS','S','M','L','XL','XXL'];
    const sizeContainer = document.getElementById('size-selector');
    sizeContainer.innerHTML = sizes.map(s => `<button class="size-opt" data-size="${s}">${s}</button>`).join('');
    sizeContainer.querySelectorAll('.size-opt').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedSize = btn.dataset.size;
        sizeContainer.querySelectorAll('.size-opt').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      });
    });

    // Thumbnails
    const thumbImages = [product.image_url,
      'https://images.unsplash.com/photo-1489987707025-afc232f7ea0f?w=400&q=80',
      'https://images.unsplash.com/photo-1571945153237-4929e783af4a?w=400&q=80',
    ];
    document.getElementById('thumbs').innerHTML = thumbImages.map((src, i) => `
      <div class="thumb ${i===0?'active':''}">
        <img src="${src}" alt="View ${i+1}">
      </div>`).join('');
    document.querySelectorAll('.thumb').forEach(t => {
      t.addEventListener('click', () => {
        document.getElementById('main-img').src = t.querySelector('img').src;
        document.querySelectorAll('.thumb').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
      });
    });

    // Qty controls
    document.getElementById('qty-minus').addEventListener('click', () => { if (qty > 1) { qty--; document.getElementById('qty-display').textContent = qty; } });
    document.getElementById('qty-plus').addEventListener('click', () => { qty++; document.getElementById('qty-display').textContent = qty; });

    document.getElementById('add-to-cart-btn').addEventListener('click', () => {
      if (!selectedSize) { alert('Please select a size.'); return; }
      addToCart({ id: product.id, name: product.name, price: effPrice, image_url: product.image_url }, selectedSize, qty);
      openCart();
    });
  }

  loadProduct();

  // Cart sidebar
  function openCart() { document.getElementById('cart-overlay').classList.add('open'); document.getElementById('cart-sidebar').classList.add('open'); renderCart(); }
  document.getElementById('cart-toggle').addEventListener('click', openCart);
  document.getElementById('cart-close').addEventListener('click', () => { document.getElementById('cart-overlay').classList.remove('open'); document.getElementById('cart-sidebar').classList.remove('open'); });
  document.getElementById('cart-overlay').addEventListener('click', () => { document.getElementById('cart-overlay').classList.remove('open'); document.getElementById('cart-sidebar').classList.remove('open'); });

  function renderCart() {
    const cart = getCart();
    const container = document.getElementById('cart-items-container');
    const footer = document.getElementById('cart-footer');
    if (!cart.length) { container.innerHTML = `<div class="empty-cart"><div class="empty-cart-icon">🛍️</div><p>Your cart is empty</p></div>`; footer.innerHTML=''; return; }
    container.innerHTML = cart.map(item => `
      <div class="cart-item">
        <div class="cart-item-img"><img src="${item.image_url||''}" alt="${item.name}"></div>
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-meta">Size: ${item.size}</div>
          <div class="cart-item-controls">
            <div class="qty-control">
              <button class="qty-btn" data-id="${item.id}" data-size="${item.size}" data-action="minus">−</button>
              <span class="qty-num">${item.quantity}</span>
              <button class="qty-btn" data-id="${item.id}" data-size="${item.size}" data-action="plus">+</button>
            </div>
            <span class="cart-item-price">₹${(item.price*item.quantity).toLocaleString('en-IN')}</span>
          </div>
          <div class="remove-item" data-id="${item.id}" data-size="${item.size}">Remove</div>
        </div>
      </div>`).join('');
    footer.innerHTML = `<div class="cart-total-row"><span class="cart-total-label">Subtotal</span><span class="cart-total-amount">₹${getCartTotal().toLocaleString('en-IN')}</span></div><a href="checkout.html" class="btn-primary" style="width:100%;justify-content:center">Proceed to Checkout →</a>`;
    container.querySelectorAll('.qty-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const {id, size, action} = btn.dataset;
        const item = getCart().find(i=>i.id==id&&i.size==size);
        if (item) updateQuantity(id, size, action==='plus'?item.quantity+1:item.quantity-1);
        renderCart();
      });
    });
    container.querySelectorAll('.remove-item').forEach(el => { el.addEventListener('click', ()=>{ removeFromCart(el.dataset.id,el.dataset.size); renderCart(); }); });
  }
</script>
</body>
</html>
